<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#145ab8">
    <title>Sem conexao</title>
    <style>
        :root {
            color-scheme: light;
            --ink: #132238;
            --muted: #64748b;
            --primary: #145ab8;
            --line: #d8e0ea;
            --surface: #ffffff;
            --soft: #f5f8fc;
        }

        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            margin: 0;
            display: grid;
            place-items: center;
            padding: 24px;
            color: var(--ink);
            background: linear-gradient(180deg, #eaf3fb 0, #f7f9fc 50%, #eef2f7 100%);
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        main {
            width: min(100%, 520px);
            padding: 32px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--surface);
            box-shadow: 0 18px 40px rgba(21, 34, 56, .10);
        }

        img {
            width: 220px;
            max-width: 100%;
            height: auto;
            margin-bottom: 24px;
        }

        h1 {
            margin: 0 0 12px;
            font-size: 1.9rem;
            line-height: 1.1;
        }

        p {
            margin: 0 0 24px;
            color: var(--muted);
            font-size: 1rem;
            line-height: 1.55;
        }

        a,
        button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 44px;
            padding: 10px 16px;
            border: 0;
            border-radius: 8px;
            color: #fff;
            background: var(--primary);
            font: inherit;
            font-weight: 800;
            text-decoration: none;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <main>
        <img src="/img/logo_governo_azul.png" alt="Prefeitura de Mangaratiba">
        <h1>Sem conexao</h1>
        <p>Esta tela fica disponivel quando a internet cai. Volte para a pagina inicial assim que a conexao retornar.</p>
        <button type="button" onclick="window.location.reload()">Tentar novamente</button>
    </main>
</body>
</html>
